schema: spec-driven

context: |
  Tech stack: Next.js 16, TypeScript 5.9, React 19, Tailwind CSS 4, Supabase
  Frontend: Shadcn UI, Radix UI, TanStack Table, Recharts
  Architecture: Server Components first, Client Components for interactivity
  Validation: Zod 4.3
  Database: Supabase (Auth & RLS)
  UI Components: Shadcn, custom inventory patterns
  Dev: ESLint 9, Prettier 3, TypeScript strict mode

rules:
  proposal:
    - Identify affected modules and dependencies
    - Include rollback plan for database schema changes
    - Security: Never commit Supabase keys or secrets
    
  specs:
    - Use Given/When/Then format for scenarios
    - RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - Include validation rules using Zod
    - Document RLS policies if database changes
    
  design:
    - Distinguish Server vs Client Components
    - Include data flow diagrams for complex features
    - Document Supabase schema changes (migrations)
    - List affected Shadcn components or custom UI
    
  tasks:
    - Group by phase: schema → components → integrations → testing
    - Keep tasks <2 hours each
    - Server logic, UI components, then integration tests
    
  apply:
    - Load: nextjs-16, supabase-auth-rls, shadcn-usage, forms-zod
    - Use `'use client'` only for interactive features
    - Validate all inputs with Zod
    - Enforce Supabase RLS policies
    
  verify:
    - Run `npm run typecheck && npm run lint`
    - Test against every spec scenario
    - Verify RLS policies if applicable
    
  archive:
    - Warn before schema deletions
    - Conventional Commits with sign-off required